<!DOCTYPE html>
<html>
	<head>
		<!-- TODO: take visual inspiration from https://suhrmann.github.io/Anno-1800-Calculator/#/demands ? -->
		<!-- TODO: migrate to vue to use computed properties ? Directly coded, not loaded from a YAML or anything
		Make a POC using farmers and workers -->
		<title>Anno 1800 Calculator</title>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css" >
		<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons"> 
		<link rel="stylesheet" href="https://code.jquery.com/ui/1.11.4/themes/humanity/jquery-ui.css"> 
		<link rel="stylesheet" href="common.css"> 
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/js-cookie/2.0.4/js.cookie.min.js"></script>
		<script src="https://code.jquery.com/ui/1.11.4/jquery-ui.min.js"></script>
		<script src="common.js"></script>
	</head>
	<body class="anno-1800">
		<div id="save-dialog" title="Save your game">
			<form>
				<label>
					City name:<br>
					<input type="text" id="save-dialog-name">
				</label>
			</form>
		</div>
		<header>
			<h1 class="title">Anno 1800 Calculator</h1>
		</header>
		<main>
			<section>
				<h2 class="title is-4">Options</h2>
				<div>
					<div class="opt-save-buttons">
						<div class="select">
							<select id="save-list"></select>
						</div>
						<button id="btn-load" class="button"><span class="icon"><i class="material-icons">file_upload</i></span><span>Load</span></button>
						<button id="btn-save" class="button"><span class="icon"><i class="material-icons">file_download</i></span><span>Save</span></button>
						<button id="btn-delete" class="button"><span class="icon"><i class="material-icons">delete</i></span><span>Delete</span></button>
					</div>
					<div>
						<label class="checkbox">
							<input type="checkbox" id="opt-round-counts" checked />
							Round requirements
						</label>
					</div>
				</div>
			</section>
				
			<section id="population">
				<h2 class="title is-4">Population</h2>
				<p>Consumption in Anno 1800 is computed in number of residences, not people.</p>
				<div>
					<section data-pop-class="old_world">
						<h3 class="title is-5">Old World</h3>
						<div class="grid">
							<div class="cell">
								<label class="label" for="pop_old_world_lvl_1">
									<div class="pop-icon">
										<img src="img/1800/pop_old_world_lvl_1.webp" alt="" />
									</div>
									<span>Farmers</span>
								</label>
								<input class="input pop_count" type="number" id="pop_old_world_lvl_1">
							</div>
							<div class="cell">
								<label class="label" for="pop_old_world_lvl_2">
									<div class="pop-icon">
										<img src="img/1800/pop_old_world_lvl_2.webp" alt="" />
									</div>
									<span>Workers</span>
								</label>
								<input class="input pop_count" type="number" id="pop_old_world_lvl_2">
							</div>
							<div class="cell">
								<label class="label" for="pop_old_world_lvl_3">
									<div class="pop-icon">
										<img src="img/1800/pop_old_world_lvl_3.webp" alt="" />
									</div>
									<span>Artisans</span>
								</label>
								<input class="input pop_count" type="number" id="pop_old_world_lvl_3">
							</div>
							<div class="cell">
								<label class="label" for="pop_old_world_lvl_4">
									<div class="pop-icon">
										<img src="img/1800/pop_old_world_lvl_4.webp" alt="" />
									</div>
									<span>Engineers</span>
								</label>
								<input class="input pop_count" type="number" id="pop_old_world_lvl_4">
							</div>
							<div class="cell">
								<label class="label" for="pop_old_world_lvl_5">
									<div class="pop-icon">
										<img src="img/1800/pop_old_world_lvl_5.webp" alt="" />
									</div>
									<span>Investors</span>
								</label>
								<input class="input pop_count" type="number" id="pop_old_world_lvl_5">
							</div>
						</div>
					</section>
				</div>
			</section>

			<section id="chains">
				<h2 class="title is-4">Chain details</h2>
				<div>
					<section id="chain_old_world" data-pop-class="old_world">
						<h3 class="title is-5">Old World</h3>
						<div class="grid is-col-min-12">
							<!-- Level 1: farmers -->
							<div class="cell chain">
								<div class="product prod_fish" data-supports="80,40,0,0,0"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_work_clothes" data-supports="65,32.5,0,0,0"></div>
								<div class="material mat_wool chain--level-1" data-ratio="1" data-factory="prod_work_clothes"></div>
							</div>

							<div class="cell chain">
								<div class="product prod_schnapps" data-supports="60,30,0,0,0"></div>
								<div class="material mat_potato chain--level-1" data-ratio="1" data-factory="prod_schnapps"></div>
							</div>

							<div class="cell chain">
								<div class="product mat_flour" data-supports="41.67,0,0,0,0"></div>
								<div class="material mat_grain chain--level-1" data-ratio="2" data-factory="mat_flour"></div>
							</div>
							<div class="cell chain">
								<div class="product mat_sugar" data-supports="83.33,0,0,0,0"></div>
								<div class="material mat_sugar_cane chain--level-1" data-ratio="1" data-factory="mat_sugar"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_jam" data-supports="50,0,0,0,0"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_soap" data-supports="285.71,240,120"></div>
								<div class="material mat_tallow chain--level-1" data-ratio="2" data-factory="prod_soap"></div>
								<div class="material mat_pigs chain--level-2" data-ratio="1" data-factory="mat_tallow"></div>
							</div>
							<div class="cell chain">
								<div class="product mat_herbs" data-supports="58.82,0,0,0,0"></div>
							</div>
							<div class="cell chain">
								<div class="product mat_hibiscus_petals" data-supports="100,0,0,0,0"></div>
							</div>
							<!-- Level 2: workers -->
							<div class="cell chain">
								<div class="product prod_sausage" data-supports="0,50,25,0,0"></div>
								<div class="material mat_pigs chain--level-1" data-ratio="1" data-factory="prod_sausage"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_bread" data-supports="0,55,27.5,0,0"></div>
								<div class="material mat_flour chain--level-1" data-ratio="0.5" data-factory="prod_bread"></div>
								<div class="material mat_grain chain--level-2" data-ratio="2" data-factory="mat_flour"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_beer" data-supports="0,65,32.5,0,0"></div>
								<div class="material mat_malt chain--level-1" data-ratio="0.5" data-factory="prod_beer"></div>
								<div class="material mat_grain chain--level-2" data-ratio="2" data-factory="mat_malt"></div>
								<div class="material mat_hops chain--level-1" data-ratio="1.5" data-factory="prod_beer"></div>
							</div>

							<div class="cell chain">
								<div class="product prod_rum" data-supports="0,50,35,17.5,0"></div>
								<div class="material mat_sugar_cane chain--level-1" data-ratio="1" data-factory="prod_rum"></div>
								<div class="material mat_wood chain--level-1" data-ratio="0.5" data-factory="prod_rum"></div>
							</div>

							<div class="cell chain">
								<!-- workers consumption:
								 	0.0001333333 ton per residence per second
									20 workers per residence
									X is number of residences we want to sustain
									F is the number of factories (1)
									factory produces 2 / min or, or 1/30 per second
									0.0001333333 * 20 * X = 1 * 1/30 
									X = 0.0001333333 * 20 / (1/30)
								-->
								<div class="product prod_high_wheeler" data-supports="0,125,0,80,40"></div>
								<div class="material mat_caoutchouc chain--level-1" data-ratio="2" data-factory="prod_high_wheeler"></div>
								<div class="material mat_steel chain--level-1" data-ratio="1" data-factory="prod_high_wheeler"></div>
								<div class="material mat_coal chain--level-2" data-ratio="0.5" data-factory="mat_steel"></div>
								<div class="material mat_iron chain--level-2" data-ratio="0.5" data-factory="mat_steel"></div>
							</div>
							<!-- TODO: penny fathings, hot sauce, beef, soccer balls, clay pipes -->
						</div>
					</section>
				</div>
			</section>

			<section id="summaries">
				<h2 class="title is-4">Requirements summary</h2>
				<div class="grid">
				</div>
			</section>
			
		</main>
		<script type="text/javascript">
$(function() {
	anno.init('1800', 'webp');
});
		</script>
	</body>
</html>
