<!DOCTYPE html>
<html>
	<head>
		<title>Anno 1404 Calculator</title>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css" >
		<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons"> 
		<link rel="stylesheet" href="https://code.jquery.com/ui/1.11.4/themes/humanity/jquery-ui.css"> 
		<link rel="stylesheet" href="common.css"> 
		<script src="https://storage.googleapis.com/code.getmdl.io/1.0.6/material.min.js" async></script>
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/js-cookie/2.0.4/js.cookie.min.js"></script>
		<script src="https://code.jquery.com/ui/1.11.4/jquery-ui.min.js"></script>
		<script src="common.js"></script>
	</head>
	<body class="anno-1404">
		<div id="save-dialog" title="Save your game">
			<form>
				<label>
					City name:<br>
					<input type="text" id="save-dialog-name">
				</label>
			</form>
		</div>
		<header>
			<h1 class="title">Anno 1404 Calculator</h1>
		</header>
		<main>
			<section>
				<h2 class="title is-4">Options</h2>
				<div>
					<div class="opt-save-buttons">
						<div class="select">
							<select id="save-list"></select>
						</div>
						<button id="btn-load" class="button"><span class="icon"><i class="material-icons">file_upload</i></span><span>Load</span></button>
						<button id="btn-save" class="button"><span class="icon"><i class="material-icons">file_download</i></span><span>Save</span></button>
						<button id="btn-delete" class="button"><span class="icon"><i class="material-icons">delete</i></span><span>Delete</span></button>
					</div>
					<div>
						<label class="checkbox">
							<input type="checkbox" id="opt-round-counts" checked />
							Round requirements
						</label>
					</div>
				</div>
			</section>
			
			<section id="population">
				<h2 class="title is-4">Population</h2>
				<div>
					<section data-pop-class="occident">
						<h3 class="title is-5">Occident</h3>
						<div class="grid">
							<div class="cell">
								<label class="label" for="pop_occident_lvl_O">
									<div class="pop-icon">
										<img src="img/1404/pop_beggar.png" alt="" />
									</div>
									<span>Beggars</span>
								</label>
								<input class="input pop_count" type="number" id="pop_occident_lvl_O">
							</div>
							<div class="cell">
								<label class="label" for="pop_occident_lvl_1">
									<div class="pop-icon">
										<img src="img/1404/pop_peasant.png" alt="" />
									</div>
									<span>Peasants</span>
								</label>
								<input class="input pop_count" type="number" id="pop_occident_lvl_1">
							</div>
							<div class="cell">
								<label class="label" for="pop_occident_lvl_2">
									<div class="pop-icon">
										<img src="img/1404/pop_citizen.png" alt="" />
									</div>
									<span>Citizens</span>
								</label>
								<input class="input pop_count" type="number" id="pop_occident_lvl_2">
							</div>
							<div class="cell">
								<label class="label" for="pop_occident_lvl_3">
									<div class="pop-icon">
										<img src="img/1404/pop_patrician.png" alt="" />
									</div>
									<span>Patricians</span>
								</label>
								<input class="input pop_count" type="number" id="pop_occident_lvl_3">
							</div>
							<div class="cell">
								<label class="label" for="pop_occident_lvl_4">
									<div class="pop-icon">
										<img src="img/1404/pop_nobleman.png" alt="" />
									</div>
									<span>Noblemen</span>
								</label>
								<input class="input pop_count" type="number" id="pop_occident_lvl_4">
							</div>
						</div>
					</section>
					<section data-pop-class="orient">
						<h3 class="title is-5">Orient</h3>
						<div class="grid">
							<div class="cell">
								<label class="label" for="pop_orient_lvl_1">
									<div class="pop-icon">
										<img src="img/1404/pop_nomad.png" alt="" />
									</div>
									<span>Nomads</span>
								</label>
								<input class="input pop_count" type="number" id="pop_orient_lvl_1">
							</div>
							<div class="cell">
								<label class="label" for="pop_orient_lvl_2">
									<div class="pop-icon">
										<img src="img/1404/pop_envoy.png" alt="" />
									</div>
									<span>Envoys</span>
								</label>
								<input class="input pop_count" type="number" id="pop_orient_lvl_2">
							</div>
						</div>
					</section>
				</div>
			</section>
			
			<section id="chains">
				<h2 class="title is-4">Chain details</h2>
				<div>
					<section id="chain_occident" data-pop-class="occident">
						<h3 class="title is-5">Occident</h3>
						<div class="grid is-col-min-12">
							<div class="cell chain">
								<div class="product prod_fish" data-supports="286,200,500,909,1250"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_cider" data-supports="500,340,340,652,1153"></div>
							</div>
							
							<div class="cell chain">
								<div class="product prod_spice" data-supports="0,0,500,909,1250"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_linen_garment" data-supports="0,0,500,909,1250"></div>
								<div class="material mat_hemp chain--level-1" data-ratio="2" data-factory="prod_linen_garment"></div>
							</div>
							
							<div class="cell chain">
								<div class="product prod_bread" data-supports="0,0,0,726,1020"></div>
								<div class="material mat_flour chain--level-1" data-ratio="1" data-factory="prod_bread"></div>
								<div class="material mat_wheat chain--level-2" data-ratio="2" data-factory="mat_flour"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_beer" data-supports="0,0,0,625,1071"></div>
								<!--
									Production (kg/min): 1500
									Consumption (kg/100 people/min): 240 (patrician), 140 (nobleman)
									Support: 1500/240*100 = 625 , 1500/140*100 ~= 1071
								-->
								<div class="material mat_herb chain--level-1" data-ratio="1" data-factory="prod_beer"></div>
								<div class="material mat_wheat chain--level-1" data-ratio="1" data-factory="prod_beer"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_leather_jerkin" data-supports="0,0,0,1425,2500"></div>
								<div class="material mat_salt chain--level-1" data-ratio="0.5" data-factory="prod_leather_jerkin"></div>
								<div class="material mat_brine chain--level-2" data-ratio="1" data-factory="mat_salt"></div>
								<div class="material mat_coal chain--level-2" data-ratio="1" data-factory="mat_salt"></div>
								<div class="material mat_animal_hide chain--level-1" data-ratio="2" data-factory="prod_leather_jerkin"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_book" data-supports="0,0,0,1875,3333"></div>
								<div class="material mat_indigo chain--level-1" data-ratio="2" data-factory="prod_book"></div>
								<div class="material mat_paper chain--level-1" data-ratio="0.5" data-factory="prod_book"></div>
								<div class="material mat_wood chain--level-2" data-ratio="2" data-factory="mat_paper"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_candlestick" data-supports="0,0,0,2500,3333"></div>
								<!--
									Production (kg/min): 2000
									Consumption (kg/100 people/min): 80 (patrician), 60 (nobleman)
									Support: 2000/80*100 = 2500 , 2000/60*100 ~= 3333
								-->
								<div class="material mat_candle chain--level-1" data-ratio="1.5" data-factory="prod_candlestick"></div>
								<div class="material mat_beeswax chain--level-2" data-ratio="2" data-factory="mat_candle"></div>
								<div class="material mat_hemp chain--level-2" data-ratio="1" data-factory="mat_candle"></div>
								<div class="material mat_brass chain--level-1" data-ratio="0.75" data-factory="prod_candlestick"></div>
								<div class="material mat_copper_ore chain--level-2" data-ratio="1" data-factory="mat_brass"></div>
								<div class="material mat_coal chain--level-2" data-ratio="0.6666666666" data-factory="mat_brass"></div>
							</div>
							
							<div class="cell chain">
								<div class="product prod_meat" data-supports="0,0,0,0,726"></div>
								<div class="material mat_cattle chain--level-1" data-ratio="2" data-factory="prod_meat"></div>
								<div class="material mat_salt chain--level-1" data-ratio="0.5" data-factory="prod_meat"></div>
								<div class="material mat_brine chain--level-2" data-ratio="1" data-factory="mat_salt"></div>
								<div class="material mat_coal chain--level-2" data-ratio="1" data-factory="mat_salt"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_wine" data-supports="0,0,0,0,1000"></div>
								<!--
									Production (kg/min): 2000
									Consumption (kg/100 people/min): 200
									Support: 2000/200*100 = 1000
								-->
								<div class="material mat_grape chain--level-1" data-ratio="3" data-factory="prod_wine"></div>
								<div class="material mat_barrel chain--level-1" data-ratio="1" data-factory="prod_wine"></div>
								<div class="material mat_wood chain--level-2" data-ratio="1" data-factory="mat_barrel"></div>
								<div class="material mat_iron chain--level-2" data-ratio="0.5" data-factory="mat_barrel"></div>
								<div class="material mat_iron_ore chain--level-3" data-ratio="1" data-factory="mat_iron"></div>
								<div class="material mat_coal chain--level-3" data-ratio="1" data-factory="mat_iron"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_fur_coat" data-supports="0,0,0,0,1562"></div>
								<!--
									Production (kg/min): 2500
									Consumption (kg/100 people/min): 160
									Support: 2500/160*100 ~= 1562
								-->
								<div class="material mat_salt chain--level-1" data-ratio="0.3333333333" data-factory="prod_fur_coat"></div>
								<div class="material mat_brine chain--level-2" data-ratio="1" data-factory="mat_salt"></div>
								<div class="material mat_coal chain--level-2" data-ratio="1" data-factory="mat_salt"></div>
								<div class="material mat_fur chain--level-1" data-ratio="1" data-factory="prod_fur_coat"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_brocade_robe" data-supports="0,0,0,0,2112"></div>
								<div class="material mat_silk chain--level-1" data-ratio="2" data-factory="prod_brocade_robe"></div>
								<div class="material mat_gold chain--level-1" data-ratio="1" data-factory="prod_brocade_robe"></div>
								<div class="material mat_coal chain--level-2" data-ratio="0.75" data-factory="mat_gold"></div>
								<div class="material mat_gold_ore chain--level-2" data-ratio="1" data-factory="mat_gold"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_glasses" data-supports="0,0,0,0,1709"></div>
								<!--
									Production (kg/min): 2000
									Consumption (kg/100 people/min): 117
									Support: 2000/117*100 ~= 1709
								-->
								<div class="material mat_quartz chain--level-1" data-ratio="0.75" data-factory="prod_glasses"></div>
								<div class="material mat_brass chain--level-1" data-ratio="0.75" data-factory="prod_glasses"></div>
								<div class="material mat_copper_ore chain--level-2" data-ratio="1" data-factory="mat_brass"></div>
								<div class="material mat_coal chain--level-2" data-ratio="0.6666666666" data-factory="mat_brass"></div>
							</div>
						</div>
					</section>
					
					<section id="chain_orient" data-pop-class="orient">
						<h3 class="title is-5">Orient</h3>
						<div class="grid is-col-min-12">
							<div class="cell chain">
								<div class="product prod_date" data-supports="450,600"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_milk" data-supports="450,600"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_carpet" data-supports="900,1500"></div>
								<div class="material mat_silk chain--level-1" data-ratio="1" data-factory="prod_carpet"></div>
								<div class="material mat_indigo chain--level-1" data-ratio="1" data-factory="prod_carpet"></div>
							</div>
							
							<div class="cell chain">
								<div class="product prod_marzipan" data-supports="0,2453"></div>
								<!--
									Production (kg/min): 4000
									Consumption (kg/100 people/min): 163
									Support: 4000/163*100 ~= 2453
								-->
								<div class="material mat_almond chain--level-1" data-ratio="2" data-factory="prod_marzipan"></div>
								<div class="material mat_sugar chain--level-1" data-ratio="1" data-factory="prod_marzipan"></div>
								<div class="material mat_sugar_cane chain--level-2" data-ratio="2" data-factory="mat_sugar"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_coffee" data-supports="0,1000"></div>
								<!--
									Production (kg/min): 1000
									Consumption (kg/100 people/min): 100
									Support: 1000/100*100 = 1000
								-->
								<div class="material mat_coffee_bean chain--level-1" data-ratio="2" data-factory="prod_coffee"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_pearl_necklace" data-supports="0,1040"></div>
								<div class="material mat_pearl chain--level-1" data-ratio="1" data-factory="prod_pearl_necklace"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_perfume" data-supports="0,1250"></div>
								<!--
									Production (kg/min): 1000
									Consumption (kg/100 people/min): 80
									Support: 1000/80*100 = 1250
								-->
								<div class="material mat_rose_oil chain--level-1" data-ratio="3" data-factory="prod_perfume"></div>
							</div>
						</div>
					</section>
				</div>
			</section>

			<section id="summaries">
				<h2 class="title is-4">Requirements summary</h2>
				<div class="grid">
					<!-- Pop Class 1 and 2 -->
					<div class="mdl-cell mdl-cell--2-col product" data-sum-of="prod_fish"></div>
					<div class="mdl-cell mdl-cell--2-col product" data-sum-of="prod_cider"></div>
					<!-- Pop Class 3 -->
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_hemp"></div>
					<div class="mdl-cell mdl-cell--2-col product" data-sum-of="prod_spice"></div>
					<div class="mdl-cell mdl-cell--2-col product" data-sum-of="prod_linen_garment"></div>
					<!-- Pop Class 4 -->
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_wheat"></div>
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_flour"></div>
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_herb"></div>
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_salt"></div>
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_brine"></div>
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_coal"></div>
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_animal_hide"></div>
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_indigo"></div>
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_paper"></div>
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_wood"></div>
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_candle"></div>
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_beeswax"></div>
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_brass"></div>
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_copper_ore"></div>
					<div class="mdl-cell mdl-cell--2-col product" data-sum-of="prod_bread"></div>
					<div class="mdl-cell mdl-cell--2-col product" data-sum-of="prod_beer"></div>
					<div class="mdl-cell mdl-cell--2-col product" data-sum-of="prod_leather_jerkin"></div>
					<div class="mdl-cell mdl-cell--2-col product" data-sum-of="prod_book"></div>
					<div class="mdl-cell mdl-cell--2-col product" data-sum-of="prod_candlestick"></div>
					<!-- Pop Class 5 -->
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_cattle"></div>
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_grape"></div>
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_barrel"></div>
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_iron"></div>
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_iron_ore"></div>
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_fur"></div>
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_silk"></div>
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_gold"></div>
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_gold_ore"></div>
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_quartz"></div>
					<div class="mdl-cell mdl-cell--2-col product" data-sum-of="prod_meat"></div>
					<div class="mdl-cell mdl-cell--2-col product" data-sum-of="prod_wine"></div>
					<div class="mdl-cell mdl-cell--2-col product" data-sum-of="prod_fur_coat"></div>
					<div class="mdl-cell mdl-cell--2-col product" data-sum-of="prod_brocade_robe"></div>
					<div class="mdl-cell mdl-cell--2-col product" data-sum-of="prod_glasses"></div>
					<!-- Orient Pop Class 1 -->
					<div class="mdl-cell mdl-cell--2-col product" data-sum-of="prod_date"></div>
					<div class="mdl-cell mdl-cell--2-col product" data-sum-of="prod_milk"></div>
					<div class="mdl-cell mdl-cell--2-col product" data-sum-of="prod_carpet"></div>
					<!-- Orient Pop Class 2 -->
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_almond"></div>
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_sugar"></div>
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_sugar_cane"></div>
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_coffee_bean"></div>
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_pearl"></div>
					<div class="mdl-cell mdl-cell--2-col material" data-sum-of="mat_rose_oil"></div>
					<div class="mdl-cell mdl-cell--2-col product" data-sum-of="prod_marzipan"></div>
					<div class="mdl-cell mdl-cell--2-col product" data-sum-of="prod_coffee"></div>
					<div class="mdl-cell mdl-cell--2-col product" data-sum-of="prod_pearl_necklace"></div>
					<div class="mdl-cell mdl-cell--2-col product" data-sum-of="prod_perfume"></div>
				</div>
			</section>
			
			<!--
				TODO: summary

				TODO: equivalences (e.g. 1 mine = 2 rotary excavators)
			-->
		</main>
		<script type="text/javascript">
$(function() {
	anno.init('1404');
});
		</script>
	</body>
</html>
