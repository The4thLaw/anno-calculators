<!DOCTYPE html>
<html>
	<head>
		<title>Anno 2070 Calculator</title>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css" >
		<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons"> 
		<link rel="stylesheet" href="https://code.jquery.com/ui/1.11.4/themes/humanity/jquery-ui.css"> 
		<link rel="stylesheet" href="common.css"> 
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/js-cookie/2.0.4/js.cookie.min.js"></script>
		<script src="https://code.jquery.com/ui/1.11.4/jquery-ui.min.js"></script>
		<script src="common.js"></script>
	</head>
	<body class="anno-2070">
		<div id="save-dialog" title="Save your game">
			<form>
				<label>
					City name:<br>
					<input type="text" id="save-dialog-name">
				</label>
			</form>
		</div>
		<header>
			<h1 class="title">Anno 2070 Calculator</h1>
		</header>
		<main>
			<section>
				<h2 class="title is-4">Options</h2>
				<div>
					<div class="opt-save-buttons">
						<div class="select">
							<select id="save-list"></select>
						</div>
						<button id="btn-load" class="button"><span class="icon"><i class="material-icons">file_upload</i></span><span>Load</span></button>
						<button id="btn-save" class="button"><span class="icon"><i class="material-icons">file_download</i></span><span>Save</span></button>
						<button id="btn-delete" class="button"><span class="icon"><i class="material-icons">delete</i></span><span>Delete</span></button>
					</div>
					<div>
						<label class="checkbox">
							<input type="checkbox" id="opt-round-counts" checked />
							Round requirements
						</label>
					</div>
				</div>
			</section>
				
			<section id="population">
				<h2 class="title is-4">Population</h2>
				<div>
					<section data-pop-class="eco">
						<h3 class="title is-5">Eco</h3>
						<div class="grid">
							<div class="cell">
								<label class="label" for="pop_eco_lvl_1">
									<div class="pop-icon">
										<img src="img/2070/pop_eco_lvl_1.png" alt="" />
									</div>
									<span>Workers</span>
								</label>
								<input class="input pop_count" type="number" id="pop_eco_lvl_1">
							</div>
							<div class="cell">
								<label class="label" for="pop_eco_lvl_2">
									<div class="pop-icon">
										<img src="img/2070/pop_eco_lvl_2.png" alt="" />
									</div>
									<span>Employees</span>
								</label>
								<input class="input pop_count" type="number" id="pop_eco_lvl_2">
							</div>
							<div class="cell">
								<label class="label" for="pop_eco_lvl_3">
									<div class="pop-icon">
										<img src="img/2070/pop_eco_lvl_3.png" alt="" />
									</div>
									<span>Engineers</span>
								</label>
								<input class="input pop_count" type="number" id="pop_eco_lvl_3">
							</div>
							<div class="cell">
								<label class="label" for="pop_eco_lvl_4">
									<div class="pop-icon">
										<img src="img/2070/pop_eco_lvl_4.png" alt="" />
									</div>
									<span>Executives</span>
								</label>
								<input class="input pop_count" type="number" id="pop_eco_lvl_4">
							</div>
						</div>
					</section>
					<section data-pop-class="tycoon">
						<h3 class="title is-5">Tycoon</h3>
						<div class="grid">
							<div class="cell">
								<label class="label" for="pop_tycoon_lvl_1">
									<div class="pop-icon">
										<img src="img/2070/pop_tycoon_lvl_1.png" alt="" />
									</div>
									<span>Workers</span>
								</label>
								<input class="input pop_count" type="number" id="pop_tycoon_lvl_1">
							</div>
							<div class="cell">
								<label class="label" for="pop_tycoon_lvl_2">
									<div class="pop-icon">
										<img src="img/2070/pop_tycoon_lvl_2.png" alt="" />
									</div>
									<span>Employees</span>
								</label>
								<input class="input pop_count" type="number" id="pop_tycoon_lvl_2">
							</div>
							<div class="cell">
								<label class="label" for="pop_tycoon_lvl_3">
									<div class="pop-icon">
										<img src="img/2070/pop_tycoon_lvl_3.png" alt="" />
									</div>
									<span>Engineers</span>
								</label>
								<input class="input pop_count" type="number" id="pop_tycoon_lvl_3">
							</div>
							<div class="cell">
								<label class="label" for="pop_tycoon_lvl_4">
									<div class="pop-icon">
										<img src="img/2070/pop_tycoon_lvl_4.png" alt="" />
									</div>
									<span>Executives</span>
								</label>
								<input class="input pop_count" type="number" id="pop_tycoon_lvl_4">
							</div>
						</div>
					</section>
					<section data-pop-class="tech">
						<h3 class="title is-5">Tech</h3>
						<div class="grid">
							<div class="cell">
								<label class="label" for="pop_tech_lvl_1">
									<div class="pop-icon">
										<img src="img/2070/pop_tech_lvl_1.png" alt="" />
									</div>
									<span>Lab assistants</span>
								</label>
								<input class="input pop_count" type="number" id="pop_tech_lvl_1">
							</div>
							<div class="cell">
								<label class="label" for="pop_tech_lvl_2">
									<div class="pop-icon">
										<img src="img/2070/pop_tech_lvl_2.png" alt="" />
									</div>
									<span>Researchers</span>
								</label>
								<input class="input pop_count" type="number" id="pop_tech_lvl_2">
							</div>
							<div class="cell">
								<label class="label" for="pop_tech_lvl_3">
									<div class="pop-icon">
										<img src="img/2070/pop_tech_lvl_3.png" alt="" />
									</div>
									<span>Geniuses</span>
								</label>
								<input class="input pop_count" type="number" id="pop_tech_lvl_3">
							</div>
						</div>
					</section>
				</div>
			</section>
			
			<section id="chains">
				<h2 class="title is-4">Chain details</h2>
				<div>
					<section id="chain_eco" data-pop-class="eco">
						<h3 class="title is-5">Eco</h3>
						<div class="grid is-col-min-12">
							<div class="cell chain">
								<div class="product prod_fish" data-supports="250,364,571,800"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_tea" data-supports="375,375,500,750"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_health_food" data-supports="0,667,857,1000"></div>
								<div class="material mat_vegetables chain--level-1" data-ratio="2" data-factory="prod_health_food"></div>
								<div class="material mat_rice chain--level-1" data-ratio="1" data-factory="prod_health_food"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_communicator" data-supports="0,571,800,1250"></div>
								<div class="material mat_chip chain--level-1" data-ratio="1" data-factory="prod_communicator"></div>
								<div class="material mat_copper chain--level-2" data-ratio="0.5" data-factory="mat_chip"></div>
								<div class="material mat_sand chain--level-2" data-ratio="0.3333333333" data-factory="mat_chip"></div>
								<div class="material mat_chip_recycled chain--level-1" data-ratio="0.6666666666" data-factory="prod_communicator"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_bio_drink" data-supports="0,0,833,1136"></div>
								<div class="material mat_fruit chain--level-1" data-ratio="2" data-factory="prod_bio_drink"></div>
								<div class="material mat_milk chain--level-1" data-ratio="1" data-factory="prod_bio_drink"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_pasta_dish" data-supports="0,0,667,909"></div>
								<div class="material mat_vegetables chain--level-1" data-ratio="1" data-factory="prod_pasta_dish"></div>
								<div class="material mat_pasta chain--level-1" data-ratio="0.5" data-factory="prod_pasta_dish"></div>
								<div class="material mat_wheat chain--level-2" data-ratio="3" data-factory="mat_pasta"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_3d_projector" data-supports="0,0,0,750"></div>
								<div class="material mat_diamond chain--level-1" data-ratio="0.5617977528" data-factory="prod_3d_projector"></div><!-- 1 / 2 / 0.89 -->
								<div class="material mat_rare_earth chain--level-1" data-ratio="1.1235955056" data-factory="prod_3d_projector"></div><!-- 1 / 0.89 -->
								<div class="material mat_manganese chain--level-2" data-ratio="0.5" data-factory="mat_rare_earth"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_robot" data-supports="0,0,0,666"></div>
								<div class="material mat_chip chain--level-1" data-ratio="0.5" data-factory="prod_robot"></div>
								<div class="material mat_copper chain--level-2" data-ratio="0.5" data-factory="mat_chip"></div>
								<div class="material mat_sand chain--level-2" data-ratio="0.3333333333" data-factory="mat_chip"></div>
								<div class="material mat_chip_recycled chain--level-1" data-ratio="0.3333333333" data-factory="prod_robot"></div>
								<div class="material mat_biopolymer chain--level-1" data-ratio="1" data-factory="prod_robot"></div>
								<div class="material mat_alga chain--level-2" data-ratio="1" data-factory="mat_biopolymer"></div>
								<div class="material mat_corn chain--level-2" data-ratio="2" data-factory="mat_biopolymer"></div>
							</div>
						</div>
					</section>
					<section id="chain_tech" data-pop-class="tech">
						<h3 class="title is-5">Tech</h3>
						<div class="grid is-col-min-12">
							<div class="cell chain">
								<div class="product prod_fish" data-supports="800,800,1600"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_functional_food" data-supports="299,444,1250"></div>
								<div class="material mat_alga chain--level-1" data-ratio="1" data-factory="prod_functional_food"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_functional_drink" data-supports="301,735,1250"></div>
								<div class="material mat_caffeine chain--level-1" data-ratio="1" data-factory="prod_functional_drink"></div>
								<div class="material mat_sugar chain--level-1" data-ratio="1" data-factory="prod_functional_drink"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_immunity_drug" data-supports="0,500,667"></div>
								<div class="material mat_enzyme chain--level-1" data-ratio="1" data-factory="prod_immunity_drugs"></div>
								<div class="material mat_coral chain--level-1" data-ratio="0.5" data-factory="prod_immunity_drugs"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_neuro_implant" data-supports="0,500,667"></div>
								<div class="material mat_sponge chain--level-1" data-ratio="1" data-factory="prod_neuro_implant"></div>
								<div class="material mat_chip chain--level-1" data-ratio="0.5" data-factory="prod_neuro_implant"></div>
								<div class="material mat_copper chain--level-2" data-ratio="0.5" data-factory="mat_chip"></div>
								<div class="material mat_sand chain--level-2" data-ratio="0.3333333333" data-factory="mat_chip"></div>
								<div class="material mat_chip_recycled chain--level-1" data-ratio="0.3333333333" data-factory="prod_neuro_implant"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_lab_instrument" data-supports="0,0,444"></div>
								<div class="material mat_platinum chain--level-1" data-ratio="1" data-factory="prod_lab_instrument"></div>
								<div class="material mat_iron chain--level-1" data-ratio="1" data-factory="prod_lab_instrument"></div>
								<div class="material mat_iron_ore chain--level-2" data-ratio="1" data-factory="mat_iron"></div>
								<div class="material mat_coal chain--level-2" data-ratio="0.5" data-factory="mat_iron"></div>
							</div>
							<div class="cell chain">
								<div class="product prod_bionic_suit" data-supports="0,0,1481"></div>
								<div class="material mat_biopolymer chain--level-1" data-ratio="1" data-factory="prod_bionic_suit"></div>
								<div class="material mat_alga chain--level-2" data-ratio="1" data-factory="mat_biopolymer"></div>
								<div class="material mat_corn chain--level-2" data-ratio="2" data-factory="mat_biopolymer"></div>
								<div class="material mat_exoskeleton chain--level-1" data-ratio="1" data-factory="prod_bionic_suit"></div>
								<div class="material mat_platinum chain--level-2" data-ratio="1" data-factory="mat_exoskeleton"></div>
								<div class="material mat_electrolite_cell chain--level-2" data-ratio="1" data-factory="mat_exoskeleton"></div>
								<div class="material mat_lithium chain--level-3" data-ratio="2" data-factory="mat_electrolite_cell"></div>
								<div class="material mat_omega_acid chain--level-3" data-ratio="2" data-factory="mat_electrolite_cell"></div>
							</div>
						</div>
					</section>
				</div>
			</section>				
			
			<section id="summaries">
				<h2 class="title is-4">Requirements summary</h2>
				<div class="grid">
				</div>
			</section>
			<!--
				TODO: ideal production chains for other goods (like tools)
				TODO: equivalences (e.g. 1 mine = 2 rotary excavators)
			-->
		</main>
		<script type="text/javascript">
$(function() {
	anno.init('2070', 'png');
});
		</script>
	</body>
</html>
